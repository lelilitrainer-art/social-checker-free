name: Check Social Free

on:
  workflow_dispatch:
    inputs:
      rows_json:
        description: 'Rows JSON from Google Sheet'
        required: true
      callback_url:
        description: 'Google Apps Script callback URL'
        required: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          ROWS_JSON: ${{ inputs.rows_json }}
          CALLBACK_URL: ${{ inputs.callback_url }}
        run: node scraper.js
